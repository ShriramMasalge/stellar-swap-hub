name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          
      - name: Install and Build
        working-directory: ./frontend
        run: |
          node --version
          npm install --legacy-peer-deps
          npx vite build

  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Verify contracts
        run: |
          ls contracts/
          echo "All contracts present"
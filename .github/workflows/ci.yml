name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: Remove old node_modules
        run: rm -rf frontend/node_modules
          
      - name: Install dependencies
        run: cd frontend && npm install
          
      - name: Build frontend
        run: cd frontend && npx --yes vite build

  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        run: rustup target add wasm32-unknown-unknown
          
      - name: Check contracts exist
        run: |
          ls contracts/
          echo "Contracts verified successfully"